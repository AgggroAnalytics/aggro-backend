version: "2"

sql:
  - engine: "postgresql"
    schema:
      - "internal/adapters/postgres/sqlc/schema/*.sql"
    queries:
      - "internal/adapters/postgres/sqlc/queries/*.sql"
    gen:
      go:
        package: "sqlc"
        out: "internal/adapters/postgres/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true

        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"

          - db_type: "geometry"
            go_type: "github.com/twpayne/go-geom.Polygon"

          - db_type: "geometry"
            nullable: true
            go_type: "*github.com/twpayne/go-geom.Polygon"
